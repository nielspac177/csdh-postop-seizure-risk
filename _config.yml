title: csdh-postop-seizure-risk
description: >-
  Companion code and interactive tools for the manuscript "A calibrated and
  conformally-deployable risk score for postoperative seizure after chronic
  subdural haematoma evacuation: a proof-of-concept multi-database study with
  value-of-information analysis."
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: false
include:
  - CALLGRAPH.md
  - CODE_REVIEW.md
  - docs/reviewer_access.md
  - docs/imrad_plan.md
  - docs/literature_review_imbalance_smallcohort.md
  - site/calculator.html
  - site/savings.html
  - site/callgraph.html
  - site/model_assets.json
exclude:
  - "*.docx"
  - "*.pdf"
  - scripts/
  - figures/
  - results/
  - LICENSE
  - .gitignore
  - requirements.txt
defaults:
  - scope:
      path: ""
    values:
      layout: default
